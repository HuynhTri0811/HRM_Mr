version: '3.4'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  nhansu-api:
    image: nhansu-api
    build:
      context: .
      dockerfile: QuanLyNhanSuMicroservice/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - postgres
    restart: always

  tinhluong-api:
    image: tinhluong-api
    build:
      context: .
      dockerfile: TinhLuongService/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Serilog__WriteTo__1__Args__databaseUrl=mongodb://mongo:mongo@mongodb:27017/HrmLogsDb?authSource=admin
    depends_on:
      - postgres
    restart: always

  chamcong-api:
    image: chamcong-api
    build:
      context: .
      dockerfile: ChamCongService/Dockerfile
    ports:
      - "8083:8083"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Serilog__WriteTo__1__Args__databaseUrl=mongodb://mongo:mongo@mongodb:27017/HrmLogsDb?authSource=admin
    depends_on:
      - postgres
    restart: always

  quyetdinh-api:
    image: quyetdinh-api
    build:
      context: .
      dockerfile: QuyetDinhService/Dockerfile
    ports:
      - "8084:8084"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Serilog__WriteTo__1__Args__databaseUrl=mongodb://mongo:mongo@mongodb:27017/HrmLogsDb?authSource=admin
    depends_on:
      - postgres
    restart: always

  api-gateway:
    image: api-gateway
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ReverseProxy__Clusters__nhansu-cluster__Destinations__destination1__Address=http://nhansu-api:8081
      - ReverseProxy__Clusters__chamcong-cluster__Destinations__destination1__Address=http://chamcong-api:8083
      - ReverseProxy__Clusters__quyetdinh-cluster__Destinations__destination1__Address=http://quyetdinh-api:8084
      - ReverseProxy__Clusters__tinhluong-cluster__Destinations__destination1__Address=http://tinhluong-api:8082
      - Serilog__WriteTo__1__Args__databaseUrl=mongodb://mongo:mongo@mongodb:27017/HrmLogsDb?authSource=admin
    depends_on:
      - nhansu-api
      - chamcong-api
      - quyetdinh-api
      - tinhluong-api
      - mongodb
    restart: always

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongo
      - MONGO_INITDB_ROOT_PASSWORD=mongo
    volumes:
      - mongodb-data:/data/db
    restart: always

volumes:
  postgres-data:
  mongodb-data:
