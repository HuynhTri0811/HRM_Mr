version: '3.4'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  nhansu-api:
    image: nhansu-api
    build:
      context: .
      dockerfile: QuanLyNhanSuMicroservice/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Serilog__WriteTo__1__Args__databaseUrl=mongodb://mongo:mongo@mongodb:27017/HrmLogsDb?authSource=admin
      - RabbitMQ__Host=rabbitmq
      - Otlp__Endpoint=http://jaeger:4317
    depends_on:
      - postgres
      - rabbitmq
    restart: always

  tinhluong-api:
    image: tinhluong-api
    build:
      context: .
      dockerfile: TinhLuongService/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Serilog__WriteTo__1__Args__databaseUrl=mongodb://mongo:mongo@mongodb:27017/HrmLogsDb?authSource=admin
      - Otlp__Endpoint=http://jaeger:4317
    depends_on:
      - postgres
    restart: always

  chamcong-api:
    image: chamcong-api
    build:
      context: .
      dockerfile: ChamCongService/Dockerfile
    ports:
      - "8083:8083"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Serilog__WriteTo__1__Args__databaseUrl=mongodb://mongo:mongo@mongodb:27017/HrmLogsDb?authSource=admin
      - RabbitMQ__Host=rabbitmq
      - Otlp__Endpoint=http://jaeger:4317
    depends_on:
      - postgres
      - rabbitmq
    restart: always

  quyetdinh-api:
    image: quyetdinh-api
    build:
      context: .
      dockerfile: QuyetDinhService/Dockerfile
    ports:
      - "8084:8084"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Serilog__WriteTo__1__Args__databaseUrl=mongodb://mongo:mongo@mongodb:27017/HrmLogsDb?authSource=admin
      - RabbitMQ__Host=rabbitmq
      - Otlp__Endpoint=http://jaeger:4317
    depends_on:
      - postgres
      - rabbitmq
    restart: always

  api-gateway:
    image: api-gateway
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ReverseProxy__Clusters__nhansu-cluster__Destinations__destination1__Address=http://nhansu-api:8081
      - ReverseProxy__Clusters__chamcong-cluster__Destinations__destination1__Address=http://chamcong-api:8083
      - ReverseProxy__Clusters__quyetdinh-cluster__Destinations__destination1__Address=http://quyetdinh-api:8084
      - ReverseProxy__Clusters__tinhluong-cluster__Destinations__destination1__Address=http://tinhluong-api:8082
      - Serilog__WriteTo__1__Args__databaseUrl=mongodb://mongo:mongo@mongodb:27017/HrmLogsDb?authSource=admin
      - Otlp__Endpoint=http://jaeger:4317
    depends_on:
      - nhansu-api
      - chamcong-api
      - quyetdinh-api
      - tinhluong-api
      - mongodb
    restart: always

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongo
      - MONGO_INITDB_ROOT_PASSWORD=mongo
    volumes:
      - mongodb-data:/data/db
    restart: always

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  grafana:
    image: grafana/grafana-enterprise:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: always

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    restart: always

volumes:
  postgres-data:
  mongodb-data:
