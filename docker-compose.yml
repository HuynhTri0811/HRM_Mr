version: '3.4'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  nhansu-api:
    image: nhansu-api
    build:
      context: .
      dockerfile: QuanLyNhanSuMicroservice/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - postgres
    restart: always

  tinhluong-api:
    image: tinhluong-api
    build:
      context: .
      dockerfile: TinhLuongService/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - postgres
    restart: always

  chamcong-api:
    image: chamcong-api
    build:
      context: .
      dockerfile: ChamCongService/Dockerfile
    ports:
      - "8083:8083"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - postgres
    restart: always

  quyetdinh-api:
    image: quyetdinh-api
    build:
      context: .
      dockerfile: QuyetDinhService/Dockerfile
    ports:
      - "8084:8084"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - postgres
    restart: always

volumes:
  postgres-data:
